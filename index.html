<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TensorFlow.js Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="main-grid">
      <div class="card">
        <h3 class="card-title">📊 Entrenamiento</h3>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="status-text" id="status-text">Listo para iniciar</p>
        <button class="btn btn-train" id="train-btn">
          ▶ Empezar Entrenamiento
        </button>
      </div>

      <div class="card chart-card">
        <h3 class="card-title">📈 Curva de Aprendizaje</h3>
        <div class="chart-container">
          <canvas id="lossChart"></canvas>
        </div>
      </div>

      <div class="card prediction-card">
        <div class="card-header">
          <h3 class="card-title">🔍 Predicción de Valores</h3>
          <span class="badge badge-idle" id="model-badge">Esperando...</span>
        </div>

        <div class="prediction-content">
          <div class="input-side">
            <input
              class="tf-input"
              type="number"
              id="x-input"
              placeholder="Ingresá el valor de X"
              disabled
            />
            <button class="btn btn-predict" id="predict-btn" disabled>
              Predecir
            </button>
          </div>

          <div class="result-box">
            <p class="result-label">RESULTADO DE LA PREDICCIÓN</p>
            <p class="result-value" id="result-value">— — —</p>
            <p class="result-hint" id="result-hint">
              y = f(x) ≈ peso × x + sesgo
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
